<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator | Sarah Manoj</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 35px 30px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #a78bfa;
      font-size: 1.6rem;
      margin-bottom: 25px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #2d2d4e;
      background: #0f0f0f;
      color: #fff;
      font-size: 1rem;
    }
    input:focus, select:focus { outline: 2px solid #a78bfa; }

    .tip-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .tip-btn {
      flex: 1;
      padding: 10px;
      background: #2d2d4e;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #fff;
      text-align: center;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .tip-btn.active {
      background: #a78bfa;
      color: #000;
      font-weight: bold;
    }

    .result-box {
      margin-top: 25px;
      background: #0f0f0f;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 18px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .result-row:last-child { margin-bottom: 0; }
    .result-label { color: #aaa; font-size: 0.9rem; }
    .result-value { color: #a78bfa; font-weight: bold; font-size: 1.1rem; }

    .reset-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: transparent;
      border: 1px solid #a78bfa;
      color: #a78bfa;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .reset-btn:hover { background: #a78bfa; color: #000; }
  </style>
</head>
<body>

  <div class="card">
    <h1>💸 Tip Calculator</h1>

    <label for="bill">Bill Amount (₹)</label>
    <input type="number" id="bill" placeholder="Enter bill amount" oninput="calculate()" />

    <label>Select Tip %</label>
    <div class="tip-buttons">
      <div class="tip-btn" onclick="setTip(5, this)">5%</div>
      <div class="tip-btn" onclick="setTip(10, this)">10%</div>
      <div class="tip-btn" onclick="setTip(15, this)">15%</div>
      <div class="tip-btn" onclick="setTip(20, this)">20%</div>
    </div>

    <label for="people">Number of People</label>
    <input type="number" id="people" placeholder="1" min="1" value="1" oninput="calculate()" />

    <div class="result-box">
      <div class="result-row">
        <span class="result-label">Tip Amount</span>
        <span class="result-value" id="tipAmount">₹0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Total Bill</span>
        <span class="result-value" id="totalAmount">₹0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Per Person</span>
        <span class="result-value" id="perPerson">₹0.00</span>
      </div>
    </div>

    <button class="reset-btn" onclick="resetCalculator()">Reset</button>
  </div>

  <script>
    let selectedTip = 0;

    function setTip(percent, el) {
      selectedTip = percent;
      document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      calculate();
    }

    function calculate() {
      const bill = parseFloat(document.getElementById('bill').value) || 0;
      const people = parseInt(document.getElementById('people').value) || 1;

      const tipAmount = (bill * selectedTip) / 100;
      const totalAmount = bill + tipAmount;
      const perPerson = totalAmount / people;

      document.getElementById('tipAmount').innerText = '₹' + tipAmount.toFixed(2);
      document.getElementById('totalAmount').innerText = '₹' + totalAmount.toFixed(2);
      document.getElementById('perPerson').innerText = '₹' + perPerson.toFixed(2);
    }

    function resetCalculator() {
      document.getElementById('bill').value = '';
      document.getElementById('people').value = 1;
      selectedTip = 0;
      document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.remove('active'));
      calculate();
    }
  </script>

</body>
  </html>
